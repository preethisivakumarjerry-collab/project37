<!DOCTYPE html>
<html lang="en">
<head>
  <title>Popover</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      background: #f4f6f9;
      padding: 40px;
      text-align: center;
    }
    button {
      margin: 10px;
    }
  </style>
</head>

<body>

<h2>Popover</h2>

<!-- 1. Placement -->
<h4>Placement</h4>
<button class="btn btn-primary" data-toggle="popover" data-placement="top"
title="Top" data-content="Top Popover">Top</button>

<button class="btn btn-success" data-toggle="popover" data-placement="right"
title="Right" data-content="Right Popover">Right</button>

<button class="btn btn-warning" data-toggle="popover" data-placement="bottom"
title="Bottom" data-content="Bottom Popover">Bottom</button>

<button class="btn btn-danger" data-toggle="popover" data-placement="left"
title="Left" data-content="Left Popover">Left</button>

<hr>

<!-- 2. Triggers -->
<h4>Triggers</h4>
<button class="btn btn-dark" data-toggle="popover" data-trigger="click"
title="Click" data-content="Click Trigger">Click</button>

<button class="btn btn-info" data-toggle="popover" data-trigger="hover"
title="Hover" data-content="Hover Trigger">Hover</button>

<button class="btn btn-secondary" data-toggle="popover" data-trigger="focus"
title="Focus" data-content="Focus Trigger">Focus</button>

<hr>

<!-- 3. Dismissible -->
<h4>Dismissible</h4>
<button tabindex="0" class="btn btn-primary"
data-toggle="popover" data-trigger="focus"
title="Dismissible" data-content="Click outside to close">
Dismissible
</button>

<hr>

<!-- 4. HTML Content -->
<h4>HTML Content</h4>
<button class="btn btn-success"
data-toggle="popover"
data-html="true"
title="<b>HTML Title</b>"
data-content="<i>This is styled content</i>">
HTML Popover
</button>

<hr>

<!-- 5. Delay -->
<h4>Delay</h4>
<button class="btn btn-warning"
data-toggle="popover"
data-delay='{"show":500,"hide":300}'
title="Delay" data-content="Wait for it...">
Delay Popover
</button>

<hr>

<!-- 6. Disabled -->
<h4>Disabled Element</h4>
<span data-toggle="popover" data-content="Disabled popover">
  <button class="btn btn-secondary" disabled>Disabled</button>
</span>

<hr>

<!-- 7. Manual -->
<h4>Manual Control</h4>
<button id="manualBtn" class="btn btn-dark">Manual Toggle</button>

<script>
  $(function () {
    $('[data-toggle="popover"]').popover({
      container: 'body'
    });

    // Manual Popover
    $('#manualBtn').popover({
      title: "Manual",
      content: "Controlled using JS",
      trigger: "manual"
    });

    $('#manualBtn').click(function () {
      $(this).popover('toggle');
    });
  });
</script>

</body>
</html>
